<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🛒 Shopping Cart Demo</h1>
  </header>

  <main>
    <section class="products">
      <div class="product">
        <h2>🍎 Apple</h2>
        <p>₹ 50</p>
        <button onclick="addToCart('Apple', 50)">Add to Cart</button>
      </div>
      <div class="product">
        <h2>🍌 Banana</h2>
        <p>₹ 20</p>
        <button onclick="addToCart('Banana', 20)">Add to Cart</button>
      </div>
      <div class="product">
        <h2>🍊 Orange</h2>
        <p>₹ 30</p>
        <button onclick="addToCart('Orange', 30)">Add to Cart</button>
      </div>
    </section>

    <section class="cart">
      <h2>Your Cart</h2>
      <ul id="cart"></ul>
      <p id="total">Total: ₹ 0</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
